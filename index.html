<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="vista/css/login.css">
</head>

<body>

    <img src="vista/img/fondo.png" id="fondo">

    <div id="panel-izquierdo">

        <div id="bienvenida">
            <p id="bienvenido">Bienvenido al</p>
            <h1 id="titulo">Sistema de Control de Filas</h1>
            <div id="linea"></div>
        </div>

        <div id="contenedor">

            <h2>Iniciar sesión</h2>

            <label id="mensaje"></label>

            <label for="input-usuario">Usuario</label>
            <input type="text" name="usuario" id="input-usuario" placeholder="Ingrese su usuario">

            <label for="input-contraseña">Contraseña</label>
            <input type="password" name="password" id="input-contraseña" placeholder="Ingrese su contraseña">

            <button class="botones" id="ingresar">Ingresar</button>

            <hr>

            <a href="vista/kiosco.html" id="ingresar-paciente">Entrar como paciente</a>
        </div>

    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="controlador/loginController.js"></script>
</body>

</html>
