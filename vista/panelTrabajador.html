<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/trabajador.css">
    <title>Mesa de Trabajo</title>
</head>

<body>

    <div id="sidebar">
        <div id="logo-clinica">
            <img src="./img/icon-clinica.png" alt="INS" id="ico-clinica">
            <h2>CLINICA INS</h2>
            <h4>LIMÓN</h4>
        </div>

        <div id="info-trabajador">
            <span id="nombre-trabajador"></span>
            <span id="area-trabajador"></span>
            <button id="cerrarSesion">Cerrar sesión</button>
        </div>
    </div>

    <div id="main">
        <div id="contenido">
            <div id="saludo">
                <h1>Mesa de Trabajo</h1>
                <p>Bienvenido</p>
            </div>

            <div id="fecha-hora">
                <img src="./img/calendario.png" alt="Fecha">
                <span id="fecha"></span>
                <img src="./img/reloj-de-pared.png" alt="Fecha">
                <span id="hora"></span>
            </div>
        </div>

        <div id="contenedor-estadisticas">

            <div class="card-stat" id="card-espera">
                <div class="icono-stat" id="icono-espera">
                    <img src="./img/grupo.png" alt="En espera">
                </div>
                <div class="texto-stat">
                    <p class="titulo-stat">En espera</p>
                    <h2 id="cant-espera">0</h2>
                    <p class="subtitulo-stat">personas</p>
                </div>
            </div>

            <div class="card-stat" id="card-atendidos">
                <div class="icono-stat" id="icono-atendidos">
                    <img src="./img/cheque.png" alt="Atendidos">
                </div>
                <div class="texto-stat">
                    <p class="titulo-stat">Atendidos hoy</p>
                    <h2 id="cant-atendidos">0</h2>
                    <p class="subtitulo-stat">turnos completados</p>
                </div>
            </div>

            <div class="card-stat" id="card-tiempo">
                <div class="icono-stat" id="icono-tiempo">
                    <img src="./img/reloj.png" alt="Tiempo promedio">
                </div>
                <div class="texto-stat">
                    <p class="titulo-stat">Tiempo promedio de espera</p>
                    <h2 id="tiempo-promedio-espera">0 <span>min</span></h2>
                    <p class="subtitulo-stat">de espera</p>
                </div>
            </div>

            <div class="card-stat" id="card-total">
                <div class="icono-stat" id="icono-total">
                    <img src="./img/reloj.png" alt="Total hoy">
                </div>
                <div class="texto-stat">
                    <p class="titulo-stat">Tiempo promedio de atencion</p>
                    <h2 id="tiempo-promedio-atencion">0 <span>min</span></h2>
                    <p class="subtitulo-stat">de espera</p>
                </div>
            </div>
        </div>

        <div id="fila-panel">

            <div id="cola">
                <h2 id="titulo-cola">Cola de espera</h2>
                <table id="tabla-cola">
                    <thead>
                        <tr>
                            <th>Posición</th>
                            <th>Código</th>
                            <th>Paciente</th>
                            <th>Tiempo de Espera</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-cola">
                    </tbody>
                </table>
            </div>

            <div id="turno-actual">
                <h2>Turno actual</h2>
            </div>

        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../controlador/TrabajadorController.js"></script>
</body>

</html>
