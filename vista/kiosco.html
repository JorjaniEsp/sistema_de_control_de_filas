<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/equipo-medico.png" type="image/svg">
    <link rel="stylesheet" href="./css/kiosco.css">
    <title>Kiosco</title>
</head>

<body>
    <header id="encabezado">

        <img src="./img/icon-clinica.png" alt="Clinica" id="icon-clinic">
        <div id="bienvenida">
            <h2>CLINICA INS</h2>
            <h4> LIMÓN</h4>
            <h2> Bienvenido</h2>
            <h4> Estamos para servirle</h4>
        </div>
    </header>

    <div id="contenedor">
        <div id="ico-input">
            <img src="./img/image.png" alt="Usuario" id="icon-usuario">
            <label for="nombre">Ingrese su nombre para solicitar turno:</label>
        </div>

        <input type="text" name="nombre" id="nombre" placeholder="Ej: Jorjanie Espinoza">

        <div id="bloque-servicios">
            <label id="lbl-input">Seleccione el servicio:</label>
            <div id="contenedor-btnServicios">

                <button class="servicio" id="farmacia" data-id="4" data-prfijo="FA">
                    <img src="./img/farmacia.png" alt="Farmacia">
                    <span>FARMACIA</span>
                </button>

                <button class="servicio" id="ventanilla" data-id="1" data-prfijo="VE">
                    <img src="./img/ventanilla.png" alt="Farmacia">
                    <span>VENTANILLA</span>
                </button>

                <button class="servicio" id="enfermeria" data-id="3" data-prfijo="EN">
                    <img src="./img/enfermeria.png" alt="Farmacia">
                    <span>ENFERMERIA</span>
                </button>

                <button class="servicio" id="consultorio" data-id="2" data-prfijo="CO">
                    <img src="./img/consultorio.png" alt="Farmacia">
                    <span>CONSULTORIO</span>
                </button>

            </div>
        </div>

        <div id="contenedor-tiquete"></div>
        <div id="mensaje-espera" style="display:none;"></div>

        <button id="CrearTiquete">SOLICITAR TURNO</button>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="../model/KioscoModel.js"></script>
    <script src="../controlador/KioscoController.js"></script>
</body>
</html>
